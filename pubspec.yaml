name: jlpt_app
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.1
  audioplayers: ^6.6.0
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  flutter_tts: ^4.2.5
  shared_preferences: ^2.5.5
  flutter_svg: ^2.2.4
  flutter_native_splash: ^2.4.7
  google_mobile_ads: ^8.0.0
  go_router: ^15.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.9
  http: ^1.6.0
  logger: ^2.4.0
  vector_math: ^2.1.4
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.40
  path_provider: ^2.1.5
  path: ^1.9.1
  pub_semver: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.21.2
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  custom_lint: 0.8.1
  riverpod_lint: 3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/fonts/
    - assets/json/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
    - family : Tmoney
      fonts :
        - asset: assets/fonts/TmoneyRoundWindRegular.otf
          weight: 500
        - asset : assets/fonts/TmoneyRoundWindExtraBold.otf
          weight: 600
